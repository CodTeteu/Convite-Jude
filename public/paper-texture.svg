<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" fill="none">
  <defs>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.025" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="1200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCF7EF" />
      <stop offset="1" stop-color="#F1E6D6" />
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" fill="url(#paper)" />
  <rect width="1200" height="1200" fill="#6A4A2A" filter="url(#grain)" opacity="0.08" />
</svg>
